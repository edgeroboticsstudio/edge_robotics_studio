<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edge Robotics Studio</title>
  <meta name="description"
    content="Edge Robotics Studio - Specialist in Robotics Software (ROS2), Embedded Systems, Computer Vision, and AI. High-fidelity simulations and professional system integration." />
  <meta name="keywords"
    content="Edge Robotics Studio, Robotics, ROS2, Embedded Systems, Computer Vision, AI, Automation, Gazebo, Simulation, PCB Design" />
  <meta name="author" content="Dharmesh Makvana" />
  <link id="canonical-link" rel="canonical" href="https://edgeroboticsstudio.com/" />
  <script>
    (function(l) {
      if (l.search[1] === 'p' ) {
        var p = l.search.slice(1).split('&').filter(function(s) {
          return s.slice(0, 2) === 'p=';
        })[0];
        if (p !== undefined) {
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + (p.slice(2) || '/') +
            l.search.slice(1).split('&').filter(function(s) {
              return s.slice(0, 2) !== 'p=';
            }).join('&').replace(/~and~/g, '&').replace(/^(.+)$/, '?$1') +
            l.hash
          );
        }
      }
    })(window.location);
  </script>
  <script>
    (function() {
      var canonical = document.getElementById('canonical-link');
      var path = window.location.pathname;
      // Remove trailing slash if present (except for root)
      if (path.length > 1 && path.endsWith('/')) {
        path = path.slice(0, -1);
      }
      canonical.setAttribute('href', 'https://edgeroboticsstudio.com' + path);
    })();
  </script>
  <style>
    /* Final resort to hide the floating reCAPTCHA badge */
    .grecaptcha-badge {
      visibility: hidden !important;
      display: none !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Robustly hide the reCAPTCHA badge if CSS fails to override injected styles
    (function () {
      setInterval(function () {
        var badge = document.querySelector('.grecaptcha-badge');
        if (badge) {
          badge.style.visibility = 'hidden';
          badge.style.display = 'none';
          badge.style.opacity = '0';
          badge.style.pointerEvents = 'none';
        }
      }, 500);
    })();
  </script>
</body>

</html>
